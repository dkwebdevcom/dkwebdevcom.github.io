{{ define "main" }}
<article class="mx-auto max-w-5xl space-y-8">
  {{ with .Params.featureImage }}
  <figure class="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-sm">
    <img src="{{ . | relURL }}" alt="{{ $.Title }}" class="h-auto w-full object-cover" />
  </figure>
  {{ end }}

  <div class="rounded-[2rem] bg-white p-8 shadow-sm">
    <header class="mb-8 space-y-4">
      <h1 class="text-4xl font-bold tracking-tight text-slate-900">{{ .Title }}</h1>
      <p class="max-w-3xl text-lg text-slate-600">{{ .Description | default .Site.Params.description }}</p>
    </header>
    <div class="prose prose-lg max-w-none text-slate-700">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
