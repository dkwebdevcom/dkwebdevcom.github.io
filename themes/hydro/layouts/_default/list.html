{{ define "main" }}
<div class="mx-auto max-w-6xl space-y-8">
  <section class="rounded-[2rem] bg-white p-8 shadow-sm">
    <header class="space-y-4">
      <h1 class="text-4xl font-bold tracking-tight text-slate-900">{{ .Title }}</h1>
      <p class="text-slate-600">{{ .Description | default .Site.Params.description }}</p>
    </header>
    <div class="mt-8 grid gap-6 md:grid-cols-2">
      {{ range .Pages }}
      <article class="rounded-3xl border border-slate-200 bg-slate-50 p-6 transition hover:-translate-y-1 hover:border-primary/30 hover:bg-white">
        <h2 class="text-2xl font-semibold text-slate-900"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="mt-3 text-slate-600">{{ .Params.description | default .Summary }}</p>
        <a href="{{ .RelPermalink }}" class="mt-6 inline-flex text-sm font-semibold text-primary">Czytaj więcej →</a>
      </article>
      {{ end }}
    </div>
  </section>
</div>
{{ end }}
